name: Build CIUNet

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-windows:
    name: Windows build (${{ matrix.name }})
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: current-python
            python-version: "3.x"
            requirements-file: requirements.txt
            pyinstaller-version: ""
          - name: win7-python-3.8.10
            python-version: "3.8.10"
            requirements-file: requirements-win7.txt
            pyinstaller-version: "==4.10"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: x64
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-win7.txt

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip wheel setuptools
          python -m pip install -r "${{ matrix.requirements-file }}"
          python -m pip install "pyinstaller${{ matrix.pyinstaller-version }}"

      - name: Build resources and executable
        shell: pwsh
        run: |
          if (Test-Path "ciu_net.pro") {
            pylupdate5 ciu_net.pro
          }
          if (Test-Path "resources.qrc") {
            pyrcc5 resources.qrc -o ciunet/resources.py
          }
          pyinstaller ciu_net.spec --noconfirm

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ciunet-${{ matrix.name }}
          path: dist/ciu_net/
          if-no-files-found: error
