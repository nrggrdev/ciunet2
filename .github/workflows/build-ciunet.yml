name: Build CIUNet

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-windows:
    name: Windows build (${{ matrix.name }})
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: current-python
            python-version: "3.x"
            requirements-file: requirements.txt
            pyinstaller-version: ""
            spec-file: ciu_net.spec
          - name: win7-python-3.8.10
            python-version: "3.8.10"
            requirements-file: requirements-win7.txt
            pyinstaller-version: "==4.10"
            spec-file: ciu_net-pyinstaller4.spec

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: x64
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-win7.txt

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip wheel setuptools
          Get-Content "${{ matrix.requirements-file }}"
          if ("${{ matrix.name }}" -eq "win7-python-3.8.10") {
            python -m pip install --no-cache-dir "PyQt5==5.15.2" "PyQt5-Qt5==5.15.2" "PyQt5-sip==12.12.2"
          }
          python -m pip install --no-cache-dir -r "${{ matrix.requirements-file }}"
          python -m pip install --no-cache-dir "pyinstaller${{ matrix.pyinstaller-version }}"
          python -m pip check

      - name: Verify imports
        shell: pwsh
        run: |
          python -m pip list
          python -c "import influxpy; from PyQt5 import QtCore, QtGui, QtNetwork, QtWidgets; import pyqtgraph, pymodbus.client, numpy_ringbuffer, validate; import ciunet.main"

      - name: Build resources and executable
        shell: pwsh
        run: |
          if (Test-Path "ciu_net.pro") {
            pylupdate5 ciu_net.pro
          }
          if (Test-Path "resources.qrc") {
            pyrcc5 resources.qrc -o ciunet/resources.py
          }
          pyinstaller "${{ matrix.spec-file }}" --clean --noconfirm

      - name: Verify bundled files
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/ciu_net/ciu_net.exe")) {
            throw "dist/ciu_net/ciu_net.exe was not created"
          }
          $qtCore = Get-ChildItem "dist/ciu_net" -Recurse -Filter "QtCore*.pyd" | Where-Object { $_.FullName -like "*PyQt5*" }
          if (-not $qtCore) {
            throw "PyQt5 QtCore was not bundled into dist/ciu_net"
          }

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ciunet-${{ matrix.name }}
          path: dist/ciu_net/
          if-no-files-found: error
