name: Build CIUNet

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build-windows:
    name: Windows build (${{ matrix.name }})
    runs-on: windows-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - name: current-python
            python-version: "3.x"
            requirements-file: requirements.txt
            pyinstaller-version: ""
            spec-file: ciu_net.spec
            win7: false
          - name: win7-python-3.8.10
            python-version: "3.8.10"
            requirements-file: requirements-win7.txt
            # 5.13.2 is the last PyInstaller that builds Windows 7-compatible
            # executables (6.0 dropped Win7) while still supporting Python 3.8
            # and the scipy 1.10 / cryptography 42 builds used here.
            pyinstaller-version: "==5.13.2"
            spec-file: ciu_net-pyinstaller4.spec
            win7: true

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          architecture: x64
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-win7.txt

      - name: Install dependencies
        shell: pwsh
        run: |
          python -m pip install --upgrade pip wheel setuptools
          Get-Content "${{ matrix.requirements-file }}"
          if ([System.Convert]::ToBoolean("${{ matrix.win7 }}")) {
            python -m pip install --no-cache-dir "PyQt5==5.15.2" "PyQt5-Qt5==5.15.2" "PyQt5-sip==12.12.2"
          }
          python -m pip install --no-cache-dir -r "${{ matrix.requirements-file }}"
          if ([System.Convert]::ToBoolean("${{ matrix.win7 }}")) {
            # Pin pyinstaller-hooks-contrib to the release contemporaneous with
            # PyInstaller 5.13.2 (both pre-PyInstaller-6). Newer contribs target
            # PyInstaller 6 APIs and break against 5.13.2.
            python -m pip install --no-cache-dir "pyinstaller${{ matrix.pyinstaller-version }}" "pyinstaller-hooks-contrib==2023.8"
          } else {
            python -m pip install --no-cache-dir "pyinstaller${{ matrix.pyinstaller-version }}"
          }
          python -m pip check

      - name: Install Win7 runtime packages
        if: matrix.win7 == true
        shell: pwsh
        run: |
          python -m pip install --no-cache-dir `
            "pyqtgraph==0.13.3" `
            "numpy-ringbuffer==0.2.2" `
            "configobj==5.0.9" `
            "influxdb==5.3.2" `
            "influxpy==0.2.1" `
            "pymodbus==3.6.9" `
            "websockets==13.1"
          python -m pip check

      - name: Verify imports
        shell: pwsh
        run: |
          python -m pip list
          python -c "import influxpy; from PyQt5 import QtCore, QtGui, QtNetwork, QtWidgets; import pyqtgraph, pymodbus.client, numpy_ringbuffer, validate; import ciunet.main"

      - name: Build resources and executable
        shell: pwsh
        run: |
          if (Test-Path "ciu_net.pro") {
            pylupdate5 ciu_net.pro
          }
          if (Test-Path "resources.qrc") {
            pyrcc5 resources.qrc -o ciunet/resources.py
          }
          pyinstaller "${{ matrix.spec-file }}" --clean --noconfirm

      - name: Verify bundled files
        shell: pwsh
        run: |
          if (-not (Test-Path "dist/ciu_net/ciu_net.exe")) {
            throw "dist/ciu_net/ciu_net.exe was not created"
          }
          $qtCore = Get-ChildItem "dist/ciu_net" -Recurse -Filter "QtCore*.pyd" | Where-Object { $_.FullName -like "*PyQt5*" }
          if (-not $qtCore) {
            throw "PyQt5 QtCore was not bundled into dist/ciu_net"
          }

      - name: Upload executable artifact
        uses: actions/upload-artifact@v4
        with:
          name: ciunet-${{ matrix.name }}
          path: dist/ciu_net/
          if-no-files-found: error
