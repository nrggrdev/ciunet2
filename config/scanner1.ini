# ******************************************************************************
# SCANNER1
# ******************************************************************************

# Scanner model
# [ name: model, type: str ]
model = TMCx-1DH3

# Scanner serial number
# [ name: serial, type: str ]
serial = 8H180807C

# FOV of the scanner
# [ name: fov_angle, unit: degree, default: 120.0 ]
fov_angle = 120.0

# FoV angle offset
# Used in case Video Start != Line Sync
# Horizontal Shift between Raw Data angle and FoV angle.
# [ name: fov_offset, unit: float, default: 0.0 ]
fov_offset = 0.0

# Analog Angle reference point
# Used when calculating analog positions in scanner signal
# Can either be t0, fov_middle video_sync
# [ name: analog_reference_point, unit: str, possible values: {t0, fov_middle, video_sync} ]
analog_reference_point = fov_middle

# Additional Analog angle reference point offset
# Can be used to manually adjust offset relative to the analog reference point defined previously.
# [ name: analog_reference_offset, type: float, unit: degree, default: 0.0 ]
analog_reference_offset = 0.0

# Scanner Display mask
# A list of kiln ranges in the form of "start , end" separated by a new line
# Each range represents a section of the kiln which will be displayed using data
# of the according scanner
# start and end are of type float
# [ type = fileName ]
mask = ./config/scannerMask1.csv

# Vertical offset in degrees
# [ name: angle_offset, type = float, valid range: [0.0, 360.0), default: 2.0 ]
vertical_offset = 5.0

# Reverse scanner data horizontally
# [ name: reverse_h, type: boolean, default: False ]
reverse_h = False

# Reverse scanner data vertically
# [ name: reverse_v, type: boolean, default: False ]
reverse_v = False

# Scanner Timeout
# Scanner is considered timed out, if no valid data has been received for this time.
# [ name: timeout, type: float, unit: seconds, default: 10.0 ]
timeout = 10.0
max_FOV_V = 150000

# Everything related to Data Aqusition from the DaLi NETA module goes in here
[receiver]
# IP Multicast Group to join when listening for data
# [ name: multicastGroup, type = IPv4 string, default: 239.1.1.1 ]
multicastGroup = 239.1.1.1

# Network Interface to which receiver UDP socket is bound to
# Specification is a valid IP interface Address, IPv4 or IPv6 following RFC5952
# specification.
# If not specified, the socket will not be bound to a specific interface
# [ name: interface, type: IPv4/6 string ]
interface = 192.168.11.201

# Source IP to listen to
# [ name: source, type: string, valid range: IP address ]
#source = 192.168.61.1
source = 192.168.71.2



# UDP port to listen on
# [ name: port, type: 16Bit unsigned integer, valid range: 0 to 65535, default: 51002 ]
port = 51002
triggerchannel = 4
[dali_control]
aktiv = False
timeout = 300s
ip = 192.168.11.11
coil = 0
delay = 2.0
normalOpen = true
[geometry]
# Passpoint #1 angle in FOV
# [ name: phi0, type: float, unit: degrees default: 30.0 ]
phi1 = 25.0

# Passpoint #1 position on the kiln surface, as measured form kiln start.
# [ name: pass1, type: float, unit: as specified in kiln/length_unit, default: 20.0 ]
pass1 = 5.0

# Passpoint #2 angle in FOV
# [ name: phi1, type: float, unit: degrees default: 90.0 ]
phi2 = 90.0

# Passpoint #2 position on the kiln surface, as measured form kiln start.
# [ name: pass2, type: float, unit: as specified in kiln/length_unit, default: 80.0 ]
pass2 = 20.0

# tilt angle of the scanner to the left of the perpendicular scanner to kiln
# Please note that the middle of the FoV is dependen on the scanner fov_angle setting.
# [ name: tilt, type: float, unit: degrees, default: 0.0 ]
tilt = 15.0
mode = tilt


[temperature]
# calibration values entered jh180911
######################################

# Temperature Transformation Mode
#
# parameters: calculate temp transformation from paremeters 
# {'A','B','C','u0','emission','transmission'}
#
# withReferences: use two calibration references. Parameters: 
# {'B','C','emission','transmission', 'P1_temp_static', 'P1_temp_source', 'P1_temp', 'P1_dig_static', 'P1_dig', 'P1_live_reference',
# 'P2_temp_static', 'P2_temp_source', 'P2_temp', 'P2_dig_static', 'P2_dig', 'P2_live_reference',
# 'live_reference_update_interval' }
#
# [ type = string, valid values = { parameters, withReferences }, default: withReferences ]
temperatureTransformationMode = withReferences

# Configuration Temperature Unit
# [ name: temp_unit, type: string, valid range: {C,K,F}, default: C ]
temp_unit = C

# ADC offset
# Used with mode == 'parameters'
# [ name: u0, type = float, default: see scanner calibration sheet ]
u0 = 838.57

# Used with mode == 'parameters'
# [ name: A, type = float, default: see scanner calibration sheet ]
A = -706132

# "Spectral" instrument constant (K) *. (Theoretically B ~= 14388 / λ)
# * The value is sufficient for T<100°C and herewith for LT scanners. The value will be provided at the initial
# delivery.
# λ = Central wavelength of used spectrum (μm).
# [ name: B, type = float, default: see scanner calibration sheet ]
B = 3780.0

# "Auxiliary" constant *
# The value is sufficient for T<100°C and herewith for LT scanners. The value will be provided at the initial
# delivery.
# [ name: C, type = float, invalid values: 0.0, default: see scanner calibration sheet ]
C = -0.70

# ε0 = Emissivity factor of the object.
# [ name: object_emission, type = float, default: 0.95 for a kiln with rusty surface ]
ε0 = 0.78

# τa = Transmission factor of the atmosphere between the scanner and the object.
# [ name: atmospheric_transmission, type = float, default: see scanner calibration sheet ]
τa = 1.00

# Non-linearity constant
# [ name: non_linearity_constant, type = float, default: 0.0 ]
non_linearity_constant = 0.0

# Temperature of object surroundings (°C).
# [ name: surroundings_temperature, type = float, default: 50.0 ]
surroundings_temperature = 50.0

# Atmospheric temperature (°C).
# [ name: atmospheric_temperature, type = float, default: 30.0 ]
atmospheric_temperature = 30.0

# Window temperature (°C).
# [ name: window_temperature, type = float, default: 30.0 ]
window_temperature = 30.0

# Window calibration temperature (°C).
# [ name: window_calibration_temperature, type = float, default: 30.0 ]
window_calibration_temperature = 30.0

# Used window transmission  factors on the measured signal.
# This option should be enabled if the scanner calibration was done without a window.
# If you only want to compensate the angle-dependent window transmission, this option shoud be set to 1.0,
# while window_transmission_table should
# have transmission of 1.0 for the best points.
# 
# Set to 1.0 if scanner is calibrated with window
# [ name: use_window_transmission, type: boolean, default: False ]
use_window_transmission = True

# Global window transmission factor.
# Used as transmission factors on the measured signal if use_window_transmission is enabled, and always as transmission factor
# for Φw
# If you only want to compensate the angle-dependent window transmission, this option shoud be set to 1.0,
# while window_transmission_table should
# have transmission of 1.0 for the best points.
# 
# Set to 1.0 if scanner is calibrated with window
window_transmission = 1.0

# Window Vignetting Transformation Table
# All Digital Values (after offset) are multiplied (or multiplied by inverse if invert_vignetting==True)
# by the interpolated factors, to compensate for angle-based vignetting of scanner thermal signal.
# Table consists of two rows, the first being the FoV-angle starting from the left video sync,
# and the second row containing either multiplication factors (with invert_vignetting=False),
# or measured dampening factors (with invert_vignetting=True), which are then inverted.
# If not specified, no window_transmission_table is used.
# [ name: vignetting, type = string to csv file, default: ./config/vignetting/vignetting_scanner_sapphire.csv ]
window_transmission_table = ./config/vignetting/vignetting_scanner_sapphire.csv

# Use static value for Reference 1 temperature value
# [ name: P1_temp_static, type: boolean, default: True ]
P1_temp_static = True

# Used with mode == 'withReferences' && P1_temp_static==False
# Valid temperature_* source can be chosen for Reference 1 temperature value.
# [ name: P1_temp_source, type = str, default: temperature_scanner ]
P1_temp_source = temperature_scanner

# Reference 1 static temperature value
# Used with mode == 'withReferences' && P1_temp_static==True
# [ name: P1_temp, type = float, unit = 'temp_unit' defined previously ]
P1_temp = 27.0

# Use static value for Reference 1 digital value
# [ name: P1_dig_static, type: boolean, default: True ]
P1_dig_static = True

# Reference 1 static digit value
# Used with mode == 'withReferences' && P1_dig_static==True
# [ name: P1_dig, type = unsigned integer ]
P1_dig = 825.0

# Reference 1 dynamic digit source
# References a [analogN] value 
# Used with mode == 'withReferences' && P1_dig_static==False
# [ name: P1_live_reference, type = str ]
P1_live_reference = LowRef

# Factor by which the digital value (static or dynamic) for Reference 1 is multiplied.
# [ name: P1_dig_factor, type = float, default: 1.0 ]
P1_dig_factor = 1.0

# Reference 1 emission
# Used when calculating u0/A.
# For internal electrical references, use value of 1.0
# [ name: P1_emission, type = float, default: 1.0 ]
P1_emission = 1.0



# Use static value for Reference 2 temperature value
# [ name: P2_temp_static, type: boolean, default: True ]
P2_temp_static = True

# Used with mode == 'withReferences' && P2_temp_static==False
# Valid temperature_* source can be chosen for Reference 2 temperature value.
# [ name: P2_temp_source, type = str, default:  ]
P2_temp_source = ""

# Reference 2 static temperature value
# Used with mode == 'withReferences' && P2_temp_static==True
# [ name: P2_temp, type = float, unit = 'temp_unit' defined previously ]
P2_temp = 250.0

# Use static value for Reference 2 digital value
# [ name: P2_dig_static, type: boolean, default: True ]
P2_dig_static = True

# Reference 2 static digit value
# Used with mode == 'withReferences' && P2_dig_static==True
# [ name: P2_dig, type = unsigned integer ]
P2_dig = 1556.0

# Reference 2 dynamic digit source
# References a [analogN] value 
# Used with mode == 'withReferences' && P2_dig_static==False
# [ name: P2_live_reference, type = str ]
P2_live_reference = HighRef

# Factor by which the digital value (static or dynamic) for Reference 2 is multiplied.
# [ name: P2_dig_factor, type = float, default: 1.0 ]
P2_dig_factor = 1.0

# Reference 2 emission
# Used when calculating u0/A.
# For internal electrical references, use value of 1.0
# [ name: P2_emission, type = float, default: 1.0 ]
P2_emission = 1.0



# 'withReferences' update temperature calculation table from
# given live references every x seconds.
# [ name: live_reference_update_interval, type = float, unit: seconds ]
live_reference_update_interval = 3.0

# Slave mode: when True, P1_temp / P2_temp are taken from non-slave scanners
# at the configured reference positions instead of the local static values.
# [ name: slave, type: boolean, default: False ]
slave = False

# Kiln-position-based reference for P1_dig / P2_dig (optional).
# [ name: P1_ref_position, type: float, unit: kiln length unit ]
# P1_ref_position = 25.0
# P1_ref_window   = 0.3
# P2_ref_position = 28.0
# P2_ref_window   = 0.3

# Temperature lower limit
# all measured temperatures below this threshold will be forcefully
# clamped to this value
# if < 0, limit is set (NAN values will remain)
#[ name: temperature_lower_limit, type: float, unit: Kelvin, default: 273.15 ]
temperature_lower_limit = 273.2

[internal_temperature]
# Name of temperature source, specified in a "temperature" section below
# [ name: source, type: string,  default: "temperature_scanner" ]
source = temperature_scanner

# Configuration Temperature Unit
# Used for lower/upper limit
# [ name: temp_unit, type: string, valid range: {C,K,F}, default: C ]
temp_unit = C

# Internal Temperature lower limit
# [ name: lowerLimit, type: float, unit = "as specified in temp_unit", default: 0.0C ]
lowerLimit = 0.0

# Upper Temperature lower limit
# [ name: upperLimit, type: float, unit = "as specified in temp_unit", default: 60.0C ]
upperLimit = 60.0





