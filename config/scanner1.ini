# List of temperature objects which can be used for either
# internal temperature source, or for online temperature recalibration.
# each section needs to begin with the keyword "temperature", and the full
# section name is used as the identifier.

[temperature_scanner]
# Type of the digital value source. Can be either
# "scanner", in which case the value of a multiplexed analog signal in the scanner line is used
# "dali", in which case one of the analog signals transmitted with the device status from the DaLi-NETA is used.
# [ name: source_type, type: string, valid valus: {scanner, dali}, default: "scanner" ]
source_type = scanner

# Name of analog_# value used for internal temperature
# [ name: source, type: string, default: "Internal_Temperature" ]
source = Internal_Temperature

# The temperature calculation for the internal scanner temperature depends on the IR board built into the scanner.
# For newer scanners (2018+), the configuration data for the internal temperature sensor can be reliably found in the
# workshop order processing (WOP) document for the scanner.
#
# There are 2 widely used default configurations.
# -40°C==570 / 60°C==2180 for newer scanners with IR-Board v1.3
# and 0°C==b / 50°C==2048+b where b=200 (baseline) for older scanners with IR-Board v1.1
# 
# For scanners with IR-Board v1.2, there are various different calibrations. Please check WOP document or contact
# Gesotec with the scanner serial number.


# Configuration Temperature Unit
# [ name: temp_unit, type: string, valid range: {C,K,F}, default: C ]
temp_unit = C

# Temperature calibration passpoint1 digital value
# [ name: P1_dig, type = float, default: 570.0 ]
P1_dig = 2326.0

# Temperature calibration passpoint1 digital value factor
# [ name: P1_factor, type = float, default: 1.0 ]
P1_factor = 1.0

# Temperature calibration passpoint1 digital value offset
# [ name: P1_offset, type = float, default: 0.0 ]
P1_offset = 0.0

# Temperature calibration passpoint1 temperature value
# [ name: P1_temp, type = float, unit = "as specified in temp_unit", default: -40.0C ]
P1_temp = -40.0

# Temperature calibration passpoint1 digital value
# [ name: P2_dig, type = float, default: 2180.0 ]
P2_dig = 8750.0

# Temperature calibration passpoint1 digital value factor
# [ name: P2_factor, type = float, default: 1.0 ]
P2_factor = 1.0

# Temperature calibration passpoint2 digital value offset
# [ name: P2_offset, type = float, default: 0.0 ]
P2_offset = 0.0

# Temperature calibration passpoint1 temperature value
# [ name: P2_temp, type = float, unit = "as specified in temp_unit", default: 60.0C ]
P2_temp = 60.0




